<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | JA Threads</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background-color: #f4f4f4; font-family: 'Segoe UI', sans-serif;">

    <nav style="background: #000; padding: 20px; color: #ffb81c; text-align: center; position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="../Assets/jamaican_logo.jpg" alt="Logo" style="height: 35px; border-radius: 4px;">
            <div style="font-size: 1.8rem; font-weight: bold;">JA Threads</div>
        </div>
        <a href="../index.html" style="color: #ffb81c; text-decoration: none; font-weight: bold; font-size: 0.9rem;">← Back to Login</a>
    </nav>

    <main style="max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <h2 style="text-align: center; color: #333; margin-bottom: 20px;">Create Your Account</h2>
        
        <form id="registrationForm">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">First Name:</label>
                    <input type="text" id="fname" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Last Name:</label>
                    <input type="text" id="lname" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Date of Birth:</label>
                    <input type="date" id="dob" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Gender:</label>
                    <select id="gender" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Phone Number:</label>
                <input type="tel" id="phone" placeholder="876-000-0000" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Email:</label>
                <input type="email" id="email" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">TRN (000-000-000):</label>
                <input type="text" id="trn" placeholder="000-000-000" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: 600; margin-bottom: 5px;">Password (Min 8 chars):</label>
                <input type="password" id="password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" style="flex: 2; background-color: #007749; color: white; padding: 14px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;">REGISTER</button>
                <button type="reset" style="flex: 1; background-color: #f44336; color: white; padding: 14px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;">CANCEL</button>
            </div>
        </form>
        
        <p id="formFeedback" style="text-align: center; margin-top: 20px; font-weight: bold; min-height: 24px; color: red;"></p>
    </main>

    <footer style="text-align: center; padding: 20px; font-size: 0.8rem; color: #666; border-top: 1px solid #ddd; margin-top: 40px;">
    <p>&copy; 2026 JA Threads | Developed by: Richardo White, Donnyl Williams, Michalia Williams</p>
    </footer>
    <script src="../script.js"></script>

</body>
</html>
